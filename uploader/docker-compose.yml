# ──────────────────────────────────────────────────────────────────────────
#  DEDICATED, ISOLATED infra for Lead Pusher ONLY.
#
#  These run on UNIQUE, non-default ports with their own credentials + vhost so
#  they are completely separate processes from any other RabbitMQ / Redis on this
#  machine (or elsewhere). This project's queues and keys therefore never appear
#  in any other broker's portal — and nothing from other brokers appears here.
#
#  Ports sit in a distinctive 353xx block (far from the 5672/6379 defaults, so
#  they won't collide), with recognizable suffixes:
#    RabbitMQ AMQP : localhost:35672   (container 5672)
#    RabbitMQ UI   : http://localhost:35673   (user/pass: leadpusher / leadpusher)
#    Redis         : localhost:35379   (container 6379)
#
#  Start:  docker compose up -d        Stop:  docker compose down
# ──────────────────────────────────────────────────────────────────────────
services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: leadpusher-rabbitmq
    hostname: leadpusher-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: leadpusher
      RABBITMQ_DEFAULT_PASS: leadpusher
      RABBITMQ_DEFAULT_VHOST: leadpusher
    ports:
      - "35672:5672"   # AMQP
      - "35673:15672"  # management UI (separate from any other RabbitMQ portal)
    volumes:
      - leadpusher_rabbitmq:/var/lib/rabbitmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: leadpusher-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "35379:6379"
    volumes:
      - leadpusher_redis:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  leadpusher_rabbitmq:
  leadpusher_redis:
